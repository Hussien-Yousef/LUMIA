<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="Css/style.css">
</head>
<body class="body">
    <div class="login">
        <div class="avater">
            <img src="img/avatar.png" alt="avatar">
        </div>
        <h2>Login</h2>
        <h3>Welcome back Kelly</h3>
        <form class="login-form" action="" method="get">
            <div class="text-box">
                <input type="email" placeholder="Username" required name="User">
            </div>
            <div class="text-box">
                <input type="password" placeholder="Write A Complex Password" required name="password">
            </div>
            <button type="submit">LOGIN</button>
            <a href="#"> Not a member? sign up now</a>
        </form>
    </div>
</body>
</html>
